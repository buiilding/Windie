appId: com.windieos.desktop
productName: WindieOS

directories:
  output: release

files:
  - dist/**/*
  - src/main/**/*
  - src/shared/**/*
  - src/preload.js
  - package.json

asar: true
asarUnpack:
  - src/main/python/**/*

publish: null

win:
  icon: src/main/assets/icons/windieos.ico
  target:
    - target: nsis

mac:
  icon: src/main/assets/icons/windieos.icns
  category: public.app-category.productivity
  target:
    - target: dmg
    - target: zip

linux:
  icon: src/main/assets/icons/windieos.app.png
  executableName: windieos
  artifactName: windieos_${version}_${arch}.${ext}
  desktop:
    Name: WindieOS
    StartupWMClass: WindieOS
  category: Utility
  maintainer: WindieOS <support@windieos.com>
  target:
    - target: AppImage
    - target: deb
    - target: rpm

rpm:
  compression: xz
