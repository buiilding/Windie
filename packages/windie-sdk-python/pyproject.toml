[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "windie-sdk"
version = "0.1.0"
description = "Public Python SDK for waking agents and routing local runtime tools."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "aiohttp>=3.9",
]

[tool.setuptools]
package-dir = { "" = "../../frontend/src/main/python" }

[tool.setuptools.packages.find]
where = ["../../frontend/src/main/python"]
include = ["windie", "windie.*"]
