<!doctype html>
<!-- Defines the index document shell for the example application workspace. -->

<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent SDK Custom UI Example</title>
    <style>
      :root {
        color: #101827;
        background: #f7fafc;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 24px;
      }

      #messages {
        min-height: 360px;
        padding: 16px;
        background: white;
        border: 1px solid #d6dde8;
        border-radius: 8px;
      }

      .message {
        margin: 0 0 12px;
        padding: 10px 12px;
        border-left: 3px solid #1d66f3;
        background: #f2f6ff;
        white-space: pre-wrap;
      }

      .message.user {
        border-left-color: #1d9a6c;
        background: #eefbf5;
      }

      form {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 12px;
      }

      label {
        font-weight: 700;
      }

      input,
      select {
        flex: 1;
        min-width: 0;
        padding: 12px;
        border: 1px solid #b8c2d2;
        border-radius: 6px;
        font: inherit;
      }

      select {
        max-width: 280px;
      }

      button {
        padding: 0 16px;
        border: 0;
        border-radius: 6px;
        background: #1d66f3;
        color: white;
        font: inherit;
        font-weight: 700;
      }

      button:disabled {
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Agent SDK Custom UI</h1>
      <div class="toolbar">
        <label for="model">Model</label>
        <select id="model"></select>
      </div>
      <section id="messages" aria-live="polite"></section>
      <form id="composer">
        <input id="prompt" autocomplete="off" value="Explain what this custom UI is using.">
        <button id="send" type="submit">Send</button>
        <button id="retry" type="button">Retry</button>
        <button id="stop" type="button">Stop</button>
      </form>
    </main>

    <script type="module">
      import {
        InMemoryConversationStore,
        AgentClient
      } from '/sdk/index.js';

      const messages = document.querySelector('#messages');
      const prompt = document.querySelector('#prompt');
      const model = document.querySelector('#model');
      const send = document.querySelector('#send');
      const retry = document.querySelector('#retry');
      const stop = document.querySelector('#stop');
      const composer = document.querySelector('#composer');
      const store = new InMemoryConversationStore();
      const client = new AgentClient({
        backendUrl: window.location.origin
      });
      const modelCatalog = await client.listModels({ userId: 'custom-ui-example-user' });
      const availableModels = modelCatalog.models.map(entry => ({
        modelProvider: entry.provider,
        modelId: entry.id,
        modelMode: entry.model_mode || 'online',
        interactionMode: 'agent',
        label: entry.label || `${entry.provider} ${entry.id}`
      }));
      for (const entry of availableModels) {
        const option = document.createElement('option');
        option.value = `${entry.modelProvider}:${entry.modelId}`;
        option.textContent = entry.label;
        model.append(option);
      }

      function selectedModel() {
        return availableModels.find(entry => `${entry.modelProvider}:${entry.modelId}` === model.value)
          || availableModels[0];
      }

      const agent = await client.wakeUp({
        agentId: 'custom-ui-example',
        name: 'Custom UI Example',
        systemPrompt: 'You are a concise SDK custom UI demo agent.',
        model: selectedModel()
      });
      const conversation = agent.conversation({
        conversationRef: 'custom-ui-example',
        store
      });

      function render(snapshot) {
        messages.replaceChildren();
        for (const message of snapshot.displayRows) {
          const row = document.createElement('article');
          row.className = `message ${message.role}`;
          const content = typeof message.content === 'string'
            ? message.content
            : JSON.stringify(message.content);
          row.textContent = `${message.role}: ${content || message.type}`;
          messages.append(row);
        }
      }

      conversation.subscribe(render);

      model.addEventListener('change', async () => {
        model.disabled = true;
        try {
          await conversation.setModel(selectedModel());
        } finally {
          model.disabled = false;
        }
      });

      composer.addEventListener('submit', async event => {
        event.preventDefault();
        const text = prompt.value.trim();
        if (!text) {
          return;
        }
        send.disabled = true;
        try {
          for await (const runtimeEvent of conversation.stream({
            text,
            model: selectedModel()
          })) {
            if (runtimeEvent.type === 'error') {
              throw runtimeEvent.error;
            }
          }
        } finally {
          send.disabled = false;
        }
      });

      retry.addEventListener('click', async () => {
        retry.disabled = true;
        try {
          await conversation.retryTurn({
            model: selectedModel()
          });
        } finally {
          retry.disabled = false;
        }
      });

      stop.addEventListener('click', async () => {
        await conversation.stop();
      });
    </script>
  </body>
</html>
